<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>地圖編輯</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.6.1/ol.css">
	<style>
		:root {
			--bg: #efe4d4;
			--panel: rgba(255, 251, 245, 0.9);
			--line: rgba(86, 57, 33, 0.14);
			--text: #2f241b;
			--text-soft: #695648;
			--accent: #b6552f;
			--shadow: 0 20px 50px rgba(77, 41, 18, 0.12);
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			height: 100%;
			font-family: 'Manrope', 'Noto Sans TC', sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at top left, rgba(255, 244, 214, 0.9), transparent 28%),
				linear-gradient(135deg, #f3ebdf, #e9dac7 55%, #e3d0bc);
		}

		body {
			padding: 18px;
			height: calc(100vh - 36px);
		}

		.map-editor-shell {
			display: grid;
			grid-template-rows: auto 1fr;
			gap: 14px;
			height: 100%;
			min-height: 0;
		}

		.map-editor-header {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 16px;
			padding: 18px 20px;
			border-radius: 24px;
			background: var(--panel);
			border: 1px solid var(--line);
			box-shadow: var(--shadow);
		}

		.map-editor-header h1 {
			margin: 0;
			font-size: 32px;
			line-height: 1.04;
		}

		.map-editor-copy {
			margin: 8px 0 0;
			color: var(--text-soft);
			line-height: 1.7;
		}

		.map-editor-badge {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-height: 40px;
			padding: 0 16px;
			border-radius: 999px;
			background: rgba(182, 85, 47, 0.12);
			color: #8d3f1e;
			font-size: 13px;
			font-weight: 800;
			white-space: nowrap;
		}

		.map-stage {
			position: relative;
			min-height: 420px;
			border-radius: 28px;
			overflow: hidden;
			border: 1px solid var(--line);
			box-shadow: var(--shadow);
			background: rgba(255, 255, 255, 0.52);
		}

		#map {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
		}

		.map-empty {
			position: absolute;
			inset: 22px;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 24px;
			border-radius: 22px;
			background: rgba(255, 251, 245, 0.9);
			border: 1px dashed rgba(86, 57, 33, 0.16);
			color: var(--text-soft);
			text-align: center;
			line-height: 1.8;
			pointer-events: none;
		}

		.map-empty.hidden {
			display: none;
		}

		.popup-card {
			min-width: 280px;
			max-width: 380px;
			padding: 14px;
			border-radius: 18px;
			background: rgba(255, 251, 245, 0.96);
			border: 1px solid rgba(86, 57, 33, 0.12);
			box-shadow: 0 20px 44px rgba(48, 27, 14, 0.2);
		}

		.popup-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			margin-bottom: 10px;
		}

		.popup-title {
			margin: 0;
			font-size: 18px;
			line-height: 1.2;
		}

		.popup-close-button {
			border: 0;
			width: 30px;
			height: 30px;
			border-radius: 999px;
			background: rgba(182, 85, 47, 0.12);
			color: #8d3f1e;
			font: inherit;
			font-size: 18px;
			line-height: 1;
			cursor: pointer;
		}

		.popup-list {
			display: grid;
			gap: 8px;
		}

		.popup-row {
			display: grid;
			grid-template-columns: 88px 1fr;
			gap: 8px;
			font-size: 13px;
			line-height: 1.6;
		}

		.popup-row strong {
			color: var(--text-soft);
		}

		.popup-row span {
			word-break: break-word;
		}
	</style>
</head>
<body>
	<div class="map-editor-shell">
		<header class="map-editor-header">
			<div>
				<h1>地圖編輯</h1>
				<p id="mapDatasetLabel" class="map-editor-copy">尚未指定資料分頁。</p>
			</div>
			<div id="mapMarkerCount" class="map-editor-badge">0 個點位</div>
		</header>
		<section class="map-stage">
			<div id="map"></div>
			<div id="mapEmptyState" class="map-empty">請在主表格勾選已完成 geocoding 且具有座標的列，地圖會即時顯示點位。</div>
			<div id="popup" class="popup-card" hidden></div>
		</section>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/ol@v10.6.1/dist/ol.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/proj4@2.12.1/dist/proj4.js"></script>
	<script src="./map-editor.js"></script>
</body>
</html>
